<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ID Viewer</title>
    <link rel="stylesheet" href="/view.css" />
  </head>
  <body>

    <!-- Loading -->
    <div id="loading" class="fullscreen-center">
      <div class="spinner"></div>
    </div>

    <!-- Not found -->
    <div id="not-found" class="fullscreen-center hidden">
      <div class="nf-icon">🔗</div>
      <h2 class="nf-title">Link not found</h2>
      <p class="nf-sub">This link may have expired or never existed.</p>
    </div>

    <!-- Page 1: Front -->
    <div class="page" id="page-front">
      <div class="top-bar">
        <span class="page-meta" id="page-meta-front"></span>
        <div class="page-dots">
          <span class="dot active"></span>
          <span class="dot"></span>
        </div>
      </div>

      <div class="card-wrap">
        <div class="card">
          <img class="card-img" id="img-front" src="" alt="Front of ID" />
        </div>
      </div>

      <div class="card-footer">
        <div class="card-info">
          <p class="card-label">1 OF 2</p>
          <h2 class="card-title">Front of ID</h2>
          <p class="card-sub">Download as TIFF for Photoshop</p>
        </div>
        <button class="pill-btn" id="btn-dl-front">DOWNLOAD</button>
      </div>

      <div class="bottom-nav">
        <button class="nav-btn" disabled>← Back</button>
        <button class="nav-btn nav-btn--primary" id="btn-next-front">Next →</button>
      </div>
    </div>

    <!-- Page 2: Back -->
    <div class="page hidden" id="page-back">
      <div class="top-bar">
        <span class="page-meta" id="page-meta-back"></span>
        <div class="page-dots">
          <span class="dot"></span>
          <span class="dot active"></span>
        </div>
      </div>

      <div class="card-wrap">
        <div class="card">
          <img class="card-img" id="img-back" src="" alt="Back of ID" />
        </div>
      </div>

      <div class="card-footer">
        <div class="card-info">
          <p class="card-label">2 OF 2</p>
          <h2 class="card-title">Back of ID</h2>
          <p class="card-sub">Download as TIFF for Photoshop</p>
        </div>
        <button class="pill-btn" id="btn-dl-back">DOWNLOAD</button>
      </div>

      <div class="bottom-nav">
        <button class="nav-btn" id="btn-prev-back">← Back</button>
        <button class="nav-btn nav-btn--primary" disabled>Next →</button>
      </div>
    </div>

    <script src="/view.js"></script>
  </body>
</html>
