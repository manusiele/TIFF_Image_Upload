<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ID Viewer</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="container">

      <h1>ID Document</h1>
      <p class="subtitle" id="subtitle">&nbsp;</p>

      <!-- Loading state -->
      <div id="loading" class="loading-spinner">
        <div class="spinner"></div>
        <span>Fetching images…</span>
      </div>

      <!-- Not found state -->
      <div id="not-found" class="not-found hidden">
        <div class="not-found-icon">🔗</div>
        <h2>Link not found</h2>
        <p>This link may have expired or never existed.</p>
      </div>

      <!-- Images grid -->
      <div id="view-grid" class="view-grid hidden">

        <div class="id-card">
          <div class="id-card-label">
            <span class="dot dot-front"></span> Front of ID
          </div>
          <img id="img-front" src="" alt="Front of ID" />
          <div class="id-card-footer">
            <button class="btn-download" id="btn-dl-front" data-side="front">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              Download TIFF
            </button>
            <span class="dl-status" id="dl-status-front"></span>
          </div>
        </div>

        <div class="id-card">
          <div class="id-card-label">
            <span class="dot dot-back"></span> Back of ID
          </div>
          <img id="img-back" src="" alt="Back of ID" />
          <div class="id-card-footer">
            <button class="btn-download" id="btn-dl-back" data-side="back">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              Download TIFF
            </button>
            <span class="dl-status" id="dl-status-back"></span>
          </div>
        </div>

      </div>

      <div id="error-msg" class="error hidden"></div>

    </div>

    <script src="/view.js"></script>
  </body>
</html>
