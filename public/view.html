<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ID Viewer</title>
    <link rel="stylesheet" href="/view.css" />
  </head>
  <body>

    <!-- Loading -->
    <div id="loading" class="fullscreen-center">
      <div class="spinner"></div>
    </div>

    <!-- Not found -->
    <div id="not-found" class="fullscreen-center hidden">
      <div class="nf-icon">🔗</div>
      <h2 class="nf-title">Link not found</h2>
      <p class="nf-sub">This link may have expired or never existed.</p>
    </div>

    <!-- Main view -->
    <div id="main" class="hidden">

      <p class="page-meta" id="page-meta"></p>

      <!-- Front card -->
      <div class="card">
        <img class="card-img" id="img-front" src="" alt="Front of ID" />
        <div class="card-overlay">
          <div class="card-row">
            <div class="card-info">
              <span class="card-badge">Front of ID</span>
              <h2 class="card-title">ID — Front</h2>
              <p class="card-sub">Tap to download as TIFF</p>
            </div>
            <button class="pill-btn" id="btn-dl-front">DOWNLOAD</button>
          </div>
        </div>
      </div>

      <!-- Back card -->
      <div class="card">
        <img class="card-img" id="img-back" src="" alt="Back of ID" />
        <div class="card-overlay">
          <div class="card-row">
            <div class="card-info">
              <span class="card-badge">Back of ID</span>
              <h2 class="card-title">ID — Back</h2>
              <p class="card-sub">Tap to download as TIFF</p>
            </div>
            <button class="pill-btn" id="btn-dl-back">DOWNLOAD</button>
          </div>
        </div>
      </div>

    </div>

    <script src="/view.js"></script>
  </body>
</html>
