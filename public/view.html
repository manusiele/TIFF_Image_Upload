<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ID Viewer</title>
    <link rel="stylesheet" href="/view.css" />
  </head>
  <body>

    <!-- Loading -->
    <div id="loading" class="fullscreen-center">
      <div class="spinner"></div>
    </div>

    <!-- Not found -->
    <div id="not-found" class="fullscreen-center hidden">
      <div class="nf-icon">🔗</div>
      <h2 class="nf-title">Link not found</h2>
      <p class="nf-sub">This link may have expired or never existed.</p>
    </div>

    <!-- Main view -->
    <div id="main" class="hidden">

      <!-- Top bar -->
      <div class="top-bar">
        <span class="page-meta" id="page-meta"></span>
        <div class="page-dots">
          <span class="dot active" id="dot-0"></span>
          <span class="dot" id="dot-1"></span>
        </div>
      </div>

      <!-- Card deck — slides left/right -->
      <div class="deck-wrapper">
        <div class="deck" id="deck">

          <!-- Page 1: Front -->
          <div class="slide">
            <div class="card">
              <img class="card-img" id="img-front" src="" alt="Front of ID" />
              <div class="card-overlay">
                <div class="card-row">
                  <div class="card-info">
                    <span class="card-badge">1 of 2</span>
                    <h2 class="card-title">Front of ID</h2>
                    <p class="card-sub">Download as TIFF for Photoshop</p>
                  </div>
                  <button class="pill-btn" id="btn-dl-front">DOWNLOAD</button>
                </div>
              </div>
            </div>
          </div>

          <!-- Page 2: Back -->
          <div class="slide">
            <div class="card">
              <img class="card-img" id="img-back" src="" alt="Back of ID" />
              <div class="card-overlay">
                <div class="card-row">
                  <div class="card-info">
                    <span class="card-badge">2 of 2</span>
                    <h2 class="card-title">Back of ID</h2>
                    <p class="card-sub">Download as TIFF for Photoshop</p>
                  </div>
                  <button class="pill-btn" id="btn-dl-back">DOWNLOAD</button>
                </div>
              </div>
            </div>
          </div>

        </div>
      </div>

      <!-- Bottom nav -->
      <div class="bottom-nav">
        <button class="nav-btn" id="btn-prev" disabled>← Back</button>
        <button class="nav-btn nav-btn--primary" id="btn-next">Next →</button>
      </div>

    </div>

    <script src="/view.js"></script>
  </body>
</html>
