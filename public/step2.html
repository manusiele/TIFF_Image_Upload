<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ID Capture — Step 2</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="container">

      <div class="steps">
        <div class="step done">
          <div class="step-num">✓</div>
          <span>Front of ID</span>
        </div>
        <div class="step-divider"></div>
        <div class="step active">
          <div class="step-num">2</div>
          <span>Back of ID</span>
        </div>
      </div>

      <h1>Back of ID</h1>
      <p class="subtitle" id="instruction">Flip the card and position the back side in the frame, then tap Capture.</p>

      <!-- Live camera -->
      <div class="video-wrapper" id="camera-wrapper">
        <video id="video" autoplay playsinline></video>
        <div id="placeholder" class="placeholder"><span>Camera feed will appear here</span></div>
      </div>

      <!-- Preview after capture -->
      <div id="preview-wrapper" class="preview-wrapper hidden">
        <img id="preview" src="" alt="Back ID preview" />
        <div class="preview-badge">✓ Back captured</div>
      </div>

      <div id="error-msg" class="error hidden"></div>
      <div id="status-msg" class="status hidden"></div>

      <div class="controls">
        <button id="btn-start" class="btn-primary">Start Camera</button>
        <button id="btn-capture" class="btn-success" disabled>Capture</button>
        <button id="btn-retake" class="btn-secondary hidden">Retake</button>
        <button id="btn-submit" class="btn-success hidden">Generate Link</button>
      </div>

      <!-- Share box shown after successful upload -->
      <div id="share-box" class="share-box hidden">
        <label>Shareable link</label>
        <div class="url-row">
          <input id="share-url" type="text" readonly />
          <button class="btn-copy" id="btn-copy">Copy</button>
        </div>
        <span class="expires-note">🕐 Expires in 7 days · Anyone with this link can view both images</span>
      </div>

    </div>

    <canvas id="canvas" style="display:none"></canvas>
    <script src="/step2.js"></script>
  </body>
</html>
